name: phlm
description: "PHLM hospital management app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.2.7
  google_fonts: ^6.2.1
  provider: ^6.1.2
  sqflite: ^2.3.0
  path: ^1.8.0
  path_provider: ^2.1.0
  http: ^1.2.0
  url_launcher: ^6.3.1
  flutter_local_notifications: ^17.0.0
  flutter_localizations:
    sdk: flutter
  local_auth: ^2.3.0
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.5
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/flutter_data.json
    - assets/datadump.json
    - assets/datadump2.json
